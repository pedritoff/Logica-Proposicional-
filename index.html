<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Motor Lógico Pro</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

input, select, button {
    padding: 10px;
    margin: 5px;
}

table {
    margin: auto;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #555;
    padding: 8px;
}

input.tabla {
    width: 40px;
    text-align: center;
}

#teclado button {
    padding: 10px;
    margin: 3px;
    font-size: 16px;
    background: #1e293b;
    color: white;
    border: none;
    cursor: pointer;
}

#teclado button:hover {
    background: #334155;
}
</style>
</head>

<body>

<h1>🧠 Motor Lógico Pro</h1>

<input id="formula" placeholder="Ej: (p ∧ q) → r">
<br>
<button onclick="analizar()">Analizar</button>

<!-- TECLADO -->
<div id="teclado">

<h3>Teclado lógico</h3>

<div>
<button onclick="agregar('p')">p</button>
<button onclick="agregar('q')">q</button>
<button onclick="agregar('r')">r</button>
<button onclick="agregar('s')">s</button>
<button onclick="agregar('t')">t</button>
</div>

<div>
<button onclick="agregar('¬')">¬</button>
<button onclick="agregar('∧')">∧</button>
<button onclick="agregar('∨')">∨</button>
<button onclick="agregar('→')">→</button>
<button onclick="agregar('↔')">↔</button>
</div>

<div>
<button onclick="agregar('|')">| (NAND)</button>
<button onclick="agregar('↓')">↓ (NOR)</button>
</div>

<div>
<button onclick="agregar('(')">(</button>
<button onclick="agregar(')')">)</button>
<button onclick="borrar()">⌫</button>
<button onclick="limpiar()">C</button>
</div>

</div>

<h2 id="resultado"></h2>
<div id="tabla"></div>

<script>

// =====================
// TECLADO
// =====================
function agregar(simbolo) {
    let input = document.getElementById("formula");
    input.value += simbolo;
}

function borrar() {
    let input = document.getElementById("formula");
    input.value = input.value.slice(0, -1);
}

function limpiar() {
    document.getElementById("formula").value = "";
}

// =====================
// EVALUADOR
// =====================
function evaluar(expr, valores) {
    let e = expr;

    // reemplazos básicos
    e = e.replace(/¬/g, "!");
    e = e.replace(/∧/g, "&&");
    e = e.replace(/∨/g, "||");

    // implicación
    e = e.replace(/→/g, "<=");

    // bicondicional
    e = e.replace(/↔/g, "==");

    // NAND
    e = e.replace(/([a-z0-1]+)\|([a-z0-1]+)/gi, "(!($1&&$2))");

    // NOR
    e = e.replace(/([a-z0-1]+)↓([a-z0-1]+)/gi, "(!($1||$2))");

    for (let v in valores) {
        e = e.replaceAll(v, valores[v]);
    }

    try {
        return eval(e) ? 1 : 0;
    } catch {
        return "error";
    }
}

// =====================
// VARIABLES
// =====================
function getVars(expr) {
    let set = new Set();
    for (let c of expr) {
        if (/[a-z]/i.test(c)) set.add(c);
    }
    return Array.from(set).sort();
}

// =====================
// TABLA
// =====================
function tablaVerdad(expr) {
    let vars = getVars(expr);
    let filas = [];

    let total = Math.pow(2, vars.length);

    for (let i = 0; i < total; i++) {
        let valores = {};
        let fila = [];

        for (let j = 0; j < vars.length; j++) {
            let val = (i >> (vars.length - j - 1)) & 1;
            valores[vars[j]] = val;
            fila.push(val);
        }

        let r = evaluar(expr, valores);
        fila.push(r);
        filas.push(fila);
    }

    return {vars, filas};
}

// =====================
// CLASIFICAR
// =====================
function clasificar(filas) {
    let resultados = filas.map(f => f[f.length - 1]);

    if (resultados.every(v => v === 1)) return "Tautología";
    if (resultados.every(v => v === 0)) return "Contradicción";
    return "Contingencia";
}

// =====================
// MOSTRAR TABLA
// =====================
function mostrarTabla(vars, filas) {
    let html = "<table><tr>";

    vars.forEach(v => html += `<th>${v}</th>`);
    html += "<th>R</th></tr>";

    filas.forEach((f, i) => {
        html += "<tr>";
        f.forEach((v, j) => {
            html += `<td>${v}</td>`;
        });
        html += "</tr>";
    });

    html += "</table>";
    document.getElementById("tabla").innerHTML = html;
}

// =====================
// ANALIZAR
// =====================
function analizar() {
    let expr = document.getElementById("formula").value;

    let {vars, filas} = tablaVerdad(expr);

    mostrarTabla(vars, filas);

    let tipo = clasificar(filas);

    document.getElementById("resultado").innerText =
        "Tipo: " + tipo;
}

</script>

</body>
</html>
