<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LogicPro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

h1 {
    text-align: center;
    margin: 20px;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.panel {
    flex: 1;
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

input, button, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    cursor: pointer;
    background: #2563eb;
    color: white;
}

button:hover {
    background: #1d4ed8;
}

#teclado button {
    background: #334155;
}

#teclado button:hover {
    background: #475569;
}

/* RESULTADO */
.badge {
    font-size: 24px;
    padding: 10px;
    border-radius: 10px;
    display: inline-block;
    margin: 10px 0;
}

.tauto { background: #14532d; }
.contra { background: #7f1d1d; }
.contin { background: #854d0e; }

/* TABLA */
table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
}

td, th {
    border: 1px solid #555;
    padding: 6px;
    text-align: center;
}

tr:hover {
    background: #1f2937;
}

.true { background: #14532d; }
.false { background: #7f1d1d; }

/* FEEDBACK */
#feedback {
    font-size: 18px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🧠 LogicPro</h1>

<div class="container">

<!-- IZQUIERDA -->
<div class="panel">

<h3>Analizar fórmula</h3>
<input id="formula" placeholder="Ej: (p ∧ q) → r">
<button onclick="analizar()">Analizar</button>

<div id="teclado">
<button onclick="add('p')">p</button>
<button onclick="add('q')">q</button>
<button onclick="add('r')">r</button>
<button onclick="add('¬')">¬</button>
<button onclick="add('∧')">∧</button>
<button onclick="add('∨')">∨</button>
<button onclick="add('→')">→</button>
<button onclick="add('|')">|</button>
<button onclick="add('↓')">↓</button>
<button onclick="add('(')">(</button>
<button onclick="add(')')">)</button>
<button onclick="clearF()">C</button>
</div>

<hr>

<h3>Modo entrenamiento</h3>
<p id="ejercicio"></p>

<select id="respuesta">
<option value="">Elegí</option>
<option>Tautología</option>
<option>Contradicción</option>
<option>Contingencia</option>
</select>

<button onclick="verificar()">Responder</button>

<p id="feedback"></p>
<p>Puntos: <span id="puntos">0</span></p>

<button onclick="nuevoEjercicio()">Nuevo ejercicio</button>

</div>

<!-- DERECHA -->
<div class="panel">

<h3>Resultado</h3>
<div id="badge"></div>

<h4 id="fnd"></h4>
<h4 id="fnc"></h4>

<div id="tabla"></div>

</div>

</div>

<script>

// =====================
// TECLADO
// =====================
function add(s){formula.value+=s;}
function clearF(){formula.value="";}

// =====================
// EVALUADOR
// =====================
function evalExpr(expr,val){
let e=expr;
e=e.replace(/¬/g,"!");
e=e.replace(/∧/g,"&&");
e=e.replace(/∨/g,"||");
e=e.replace(/→/g,"<=");
e=e.replace(/↔/g,"==");
e=e.replace(/([a-z0-1]+)\|([a-z0-1]+)/g,"(!($1&&$2))");
e=e.replace(/([a-z0-1]+)↓([a-z0-1]+)/g,"(!($1||$2))");

for(let v in val) e=e.replaceAll(v,val[v]);

try{return eval(e)?1:0}catch{return 0}
}

// =====================
// VARIABLES
// =====================
function vars(expr){
return [...new Set(expr.match(/[a-z]/g))].sort();
}

// =====================
// TABLA
// =====================
function tabla(expr){
let v=vars(expr);
let filas=[];
let t=2**v.length;

for(let i=0;i<t;i++){
let val={},f=[];
for(let j=0;j<v.length;j++){
let x=(i>>(v.length-j-1))&1;
val[v[j]]=x;
f.push(x);
}
f.push(evalExpr(expr,val));
filas.push(f);
}
return {v,filas};
}

// =====================
// CLASIFICAR
// =====================
function tipo(f){
let r=f.map(x=>x.at(-1));
if(r.every(v=>v==1)) return "Tautología";
if(r.every(v=>v==0)) return "Contradicción";
return "Contingencia";
}

// =====================
// BADGE
// =====================
function pintarTipo(t){
let b=document.getElementById("badge");
b.className="badge";

if(t=="Tautología") b.classList.add("tauto");
if(t=="Contradicción") b.classList.add("contra");
if(t=="Contingencia") b.classList.add("contin");

b.innerText=t;
}

// =====================
// FND / FNC
// =====================
function FND(v,f){
return f.filter(x=>x.at(-1)==1).map(x=>
"("+v.map((a,i)=>x[i]?a:"¬"+a).join(" ∧ ")+")"
).join(" ∨ ")||"Contradicción";
}

function FNC(v,f){
return f.filter(x=>x.at(-1)==0).map(x=>
"("+v.map((a,i)=>x[i]?"¬"+a:a).join(" ∨ ")+")"
).join(" ∧ ")||"Tautología";
}

// =====================
// MOSTRAR TABLA
// =====================
function mostrar(v,f){
let h="<table><tr>";
v.forEach(x=>h+="<th>"+x+"</th>");
h+="<th>R</th></tr>";

f.forEach(r=>{
h+="<tr>";
r.forEach(x=>{
let c=x?"true":"false";
h+=`<td class="${c}">${x}</td>`;
});
h+="</tr>";
});

tabla.innerHTML=h;
}

// =====================
// ANALIZAR
// =====================
function analizar(){
let expr=formula.value;
let {v,filas}=tabla(expr);

let t=tipo(filas);
pintarTipo(t);

fnd.innerText="FND: "+FND(v,filas);
fnc.innerText="FNC: "+FNC(v,filas);

mostrar(v,filas);
}

// =====================
// ENTRENAMIENTO REAL
// =====================
let puntos=0;
let actual="";

function nuevoEjercicio(){
let lista=[
"(p ∨ ¬p)",
"(p ∧ ¬p)",
"(p → q)",
"(p ∧ q)",
"(p | q)"
];
actual=lista[Math.floor(Math.random()*lista.length)];
ejercicio.innerText=actual;
feedback.innerText="";
}

function verificar(){
let resp=respuesta.value;
if(!resp) return;

let {filas}=tabla(actual);
let correcto=tipo(filas);

if(resp===correcto){
feedback.innerText="✔ Correcto";
puntos++;
}else{
feedback.innerText="❌ Incorrecto (era "+correcto+")";
}

document.getElementById("puntos").innerText=puntos;
}

</script>

</body>
</html>
