<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Motor Lógico Pro</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

input, select, button {
    padding: 10px;
    margin: 5px;
}

table {
    margin: auto;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #555;
    padding: 8px;
}

input.tabla {
    width: 40px;
    text-align: center;
}

#teclado button {
    padding: 10px;
    margin: 3px;
    font-size: 16px;
    background: #1e293b;
    color: white;
    border: none;
    cursor: pointer;
}

#teclado button:hover {
    background: #334155;
}
</style>
</head>

<body>

<h1>🧠 Motor Lógico Pro</h1>

<h3>Analizar fórmula</h3>
<input id="formula" placeholder="Ej: (p ∧ q) → r">
<br>
<button onclick="analizar()">Analizar</button>

<!-- TECLADO -->
<div id="teclado">
<h3>Teclado lógico</h3>

<div>
<button onclick="agregar('p')">p</button>
<button onclick="agregar('q')">q</button>
<button onclick="agregar('r')">r</button>
<button onclick="agregar('s')">s</button>
<button onclick="agregar('t')">t</button>
</div>

<div>
<button onclick="agregar('¬')">¬</button>
<button onclick="agregar('∧')">∧</button>
<button onclick="agregar('∨')">∨</button>
<button onclick="agregar('→')">→</button>
<button onclick="agregar('↔')">↔</button>
</div>

<div>
<button onclick="agregar('|')">| NAND</button>
<button onclick="agregar('↓')">↓ NOR</button>
</div>

<div>
<button onclick="agregar('(')">(</button>
<button onclick="agregar(')')">)</button>
<button onclick="borrar()">⌫</button>
<button onclick="limpiar()">C</button>
</div>
</div>

<h3>Generar desde tipo</h3>
<select id="tipo">
    <option>Tautología</option>
    <option>Contradicción</option>
    <option>Contingencia</option>
</select>

<input id="vars" type="number" placeholder="Cantidad variables">
<br>
<button onclick="generar()">Generar</button>

<h2 id="resultado"></h2>
<h3 id="fnd"></h3>
<h3 id="fnc"></h3>

<div id="tabla"></div>

<script>

// =====================
// TECLADO
// =====================
function agregar(s) {
    document.getElementById("formula").value += s;
}
function borrar() {
    let i = document.getElementById("formula");
    i.value = i.value.slice(0,-1);
}
function limpiar() {
    document.getElementById("formula").value = "";
}

// =====================
// EVALUADOR
// =====================
function evaluar(expr, valores) {
    let e = expr;

    e = e.replace(/¬/g, "!");
    e = e.replace(/∧/g, "&&");
    e = e.replace(/∨/g, "||");
    e = e.replace(/→/g, "<=");
    e = e.replace(/↔/g, "==");

    e = e.replace(/([a-z0-1]+)\|([a-z0-1]+)/gi, "(!($1&&$2))");
    e = e.replace(/([a-z0-1]+)↓([a-z0-1]+)/gi, "(!($1||$2))");

    for (let v in valores) {
        e = e.replaceAll(v, valores[v]);
    }

    try { return eval(e) ? 1 : 0; }
    catch { return "error"; }
}

// =====================
// VARIABLES
// =====================
function getVars(expr) {
    let s = new Set();
    for (let c of expr) if (/[a-z]/i.test(c)) s.add(c);
    return Array.from(s).sort();
}

// =====================
// TABLA
// =====================
function tablaVerdad(expr) {
    let vars = getVars(expr);
    let filas = [];
    let total = 2 ** vars.length;

    for (let i=0;i<total;i++) {
        let valores={}, fila=[];
        for (let j=0;j<vars.length;j++) {
            let val = (i >> (vars.length-j-1)) & 1;
            valores[vars[j]] = val;
            fila.push(val);
        }
        fila.push(evaluar(expr,valores));
        filas.push(fila);
    }
    return {vars,filas};
}

// =====================
// CLASIFICAR
// =====================
function clasificar(filas){
    let r = filas.map(f=>f[f.length-1]);
    if (r.every(v=>v===1)) return "Tautología";
    if (r.every(v=>v===0)) return "Contradicción";
    return "Contingencia";
}

// =====================
// FND
// =====================
function generarFND(vars, filas){
    let partes=[];
    filas.forEach(f=>{
        if(f[f.length-1]===1){
            let t=[];
            for(let i=0;i<vars.length;i++){
                t.push(f[i]===1?vars[i]:"¬"+vars[i]);
            }
            partes.push("("+t.join(" ∧ ")+")");
        }
    });
    return partes.join(" ∨ ")||"Contradicción";
}

// =====================
// FNC
// =====================
function generarFNC(vars, filas){
    let partes=[];
    filas.forEach(f=>{
        if(f[f.length-1]===0){
            let t=[];
            for(let i=0;i<vars.length;i++){
                t.push(f[i]===1?"¬"+vars[i]:vars[i]);
            }
            partes.push("("+t.join(" ∨ ")+")");
        }
    });
    return partes.join(" ∧ ")||"Tautología";
}

// =====================
// MOSTRAR
// =====================
function mostrarTabla(vars, filas){
    let html="<table><tr>";
    vars.forEach(v=>html+=`<th>${v}</th>`);
    html+="<th>R</th></tr>";

    filas.forEach(f=>{
        html+="<tr>";
        f.forEach(v=>html+=`<td>${v}</td>`);
        html+="</tr>";
    });

    html+="</table>";
    document.getElementById("tabla").innerHTML=html;
}

// =====================
// ANALIZAR
// =====================
function analizar(){
    let expr=document.getElementById("formula").value;
    let {vars,filas}=tablaVerdad(expr);

    mostrarTabla(vars,filas);

    document.getElementById("resultado").innerText=
        "Tipo: "+clasificar(filas);

    document.getElementById("fnd").innerText=
        "FND: "+generarFND(vars,filas);

    document.getElementById("fnc").innerText=
        "FNC: "+generarFNC(vars,filas);
}

// =====================
// GENERAR
// =====================
function generar(){
    let tipo=document.getElementById("tipo").value;
    let n=parseInt(document.getElementById("vars").value);

    let vars=[];
    for(let i=0;i<n;i++) vars.push(String.fromCharCode(112+i));

    let filas=[];
    let total=2**n;

    for(let i=0;i<total;i++){
        let fila=[];
        for(let j=0;j<n;j++){
            fila.push((i>>(n-j-1))&1);
        }

        let r;
        if(tipo==="Tautología") r=1;
        else if(tipo==="Contradicción") r=0;
        else r=i%2;

        fila.push(r);
        filas.push(fila);
    }

    mostrarTabla(vars,filas);

    document.getElementById("resultado").innerText=
        "Tipo: "+tipo;

    document.getElementById("fnd").innerText=
        "FND: "+generarFND(vars,filas);

    document.getElementById("fnc").innerText=
        "FNC: "+generarFNC(vars,filas);
}

</script>

</body>
</html>
